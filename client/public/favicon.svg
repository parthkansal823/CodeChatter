<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1A1C2E"/>
      <stop offset="1" stop-color="#0F101A"/>
    </linearGradient>

    <linearGradient id="borderGrad" x1="100" y1="140" x2="412" y2="395" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#D988FF"/>
      <stop offset="50%" stop-color="#4BB1FF"/>
      <stop offset="100%" stop-color="#00D1FF"/>
    </linearGradient>

    <linearGradient id="glassFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.04"/>
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <filter id="depthShadow" x="-20%" y="-20%" width="140%" height="140%" filterUnits="userSpaceOnUse">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="12"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="120" fill="url(#bgGrad)"/>

  <path d="M150 140C122.386 140 100 162.386 100 190V310C100 337.614 122.386 360 150 360H175L185 395L230 360H362C389.614 360 412 337.614 412 310V190C412 162.386 389.614 140 362 140H150Z" 
        fill="url(#glassFill)" 
        stroke="url(#borderGrad)" 
        stroke-width="12" 
        stroke-linejoin="round"
        filter="url(#depthShadow)"/>

  <g stroke="white" stroke-width="26" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <path d="M205 210L165 250L205 290" />
    <path d="M275 195L235 305" />
    <path d="M305 210L345 250L305 290" />
  </g>
  
  <path d="M150 146H362C380 146 395 161 395 179" stroke="white" stroke-width="2" stroke-opacity="0.25" fill="none"/>
</svg>
